<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CredPositivo | Analise seu CPF</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/positivo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="description" content="Descubra sua real situacao de credito em 60 segundos. Analise gratuita do seu CPF.">
    <style>
        :root {
            --color-bg: #0F1115;
            --color-primary: #3B82F6;
            --color-accent: #22C55E;
            --color-primary-dim: rgba(59, 130, 246, 0.15);
            --color-primary-glow: rgba(59, 130, 246, 0.4);
            --color-glass: rgba(255, 255, 255, 0.03);
            --color-glass-card: rgba(255, 255, 255, 0.04);
            --color-border: rgba(255, 255, 255, 0.08);
            --color-text: #FFFFFF;
            --color-text-muted: #9CA3AF;
            --color-danger: #EF4444;
            --color-warning: #F59E0B;
            --color-success: #22C55E;
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--color-bg);
            background-image:
                radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(34, 197, 94, 0.08) 0%, transparent 40%);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .quiz-container {
            width: 100%;
            max-width: 520px;
            position: relative;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-section img {
            height: 44px;
            width: auto;
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            margin-bottom: 28px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
            border-radius: 4px;
            transition: width 0.5s ease;
            width: 0%;
        }

        /* Chat bubble */
        .chat-area {
            min-height: 120px;
            margin-bottom: 24px;
        }

        .chat-bubble {
            background: var(--color-glass-card);
            border: 1px solid var(--color-border);
            border-radius: 20px 20px 20px 4px;
            padding: 22px 26px;
            font-size: 18px;
            line-height: 1.7;
            backdrop-filter: blur(12px);
            animation: bubbleIn 0.4s ease-out;
            margin-bottom: 8px;
        }

        .chat-bubble strong {
            color: var(--color-primary);
        }

        .chat-bubble .highlight {
            color: var(--color-accent);
            font-weight: 600;
        }

        .chat-sender {
            font-size: 13px;
            color: var(--color-text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-sender .dot {
            width: 8px;
            height: 8px;
            background: var(--color-accent);
            border-radius: 50%;
            display: inline-block;
        }

        @keyframes bubbleIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Options */
        .options-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: fadeUp 0.4s ease-out 0.2s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .option-btn {
            background: var(--color-glass-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 16px 22px;
            color: var(--color-text);
            font-size: 17px;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .option-btn:hover {
            border-color: var(--color-primary);
            background: var(--color-primary-dim);
            transform: translateX(4px);
        }

        .option-btn.selected {
            border-color: var(--color-primary);
            background: var(--color-primary-dim);
            box-shadow: 0 0 20px var(--color-primary-glow);
        }

        .option-btn .option-marker {
            width: 22px;
            height: 22px;
            border: 2px solid var(--color-border);
            border-radius: 50%;
            flex-shrink: 0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-btn.selected .option-marker {
            border-color: var(--color-primary);
            background: var(--color-primary);
        }

        .option-btn.selected .option-marker::after {
            content: '';
            width: 9px;
            height: 9px;
            background: white;
            border-radius: 50%;
        }

        /* Checkbox style for multi-select */
        .option-btn .option-check {
            width: 22px;
            height: 22px;
            border: 2px solid var(--color-border);
            border-radius: 6px;
            flex-shrink: 0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        .option-btn.selected .option-check {
            border-color: var(--color-primary);
            background: var(--color-primary);
        }

        .option-btn.selected .option-check::after {
            content: '\2713';
            color: white;
            font-weight: 700;
        }

        /* Continue button */
        .btn-continue {
            width: 100%;
            padding: 18px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 18px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            margin-top: 14px;
            transition: all 0.25s;
            box-shadow: 0 0 20px var(--color-primary-glow);
            display: none;
        }

        .btn-continue.visible {
            display: block;
            animation: fadeUp 0.3s ease-out;
        }

        .btn-continue:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px var(--color-primary-glow);
        }

        /* Input fields */
        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 15px;
            color: var(--color-text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            color: white;
            font-size: 18px;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-dim);
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.25);
        }

        /* Result card */
        .result-card {
            background: var(--color-glass-card);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            padding: 32px;
            backdrop-filter: blur(12px);
            animation: bubbleIn 0.5s ease-out;
        }

        .result-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .result-badge.critical {
            background: rgba(239, 68, 68, 0.15);
            color: var(--color-danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .result-badge.attention {
            background: rgba(245, 158, 11, 0.15);
            color: var(--color-warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .result-badge.preventive {
            background: rgba(34, 197, 94, 0.15);
            color: var(--color-success);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .result-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .result-items {
            list-style: none;
            margin-bottom: 22px;
        }

        .result-items li {
            padding: 10px 0;
            font-size: 16px;
            color: var(--color-text-muted);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            line-height: 1.5;
        }

        .result-items li .icon {
            flex-shrink: 0;
            margin-top: 2px;
        }

        .result-note {
            font-size: 15px;
            color: var(--color-text-muted);
            padding: 14px 18px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.04);
            margin-bottom: 22px;
            line-height: 1.6;
        }

        .btn-whatsapp {
            width: 100%;
            padding: 18px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 18px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.3);
            text-decoration: none;
        }

        .btn-whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.5);
        }

        .btn-whatsapp svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* Step hidden */
        .step { display: none; }
        .step.active { display: block; }

        /* Variant indicator — hidden from users, visible only with ?debug=1 */
        .variant-tag {
            display: none;
            position: fixed;
            top: 12px;
            right: 12px;
            font-size: 11px;
            color: var(--color-text-muted);
            background: rgba(0,0,0,0.4);
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid var(--color-border);
            z-index: 100;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 14px 20px;
            background: var(--color-glass-card);
            border: 1px solid var(--color-border);
            border-radius: 20px 20px 20px 4px;
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: var(--color-text-muted);
            border-radius: 50%;
            animation: typingDot 1.4s ease-in-out infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Disclaimer */
        .disclaimer {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            margin-top: 28px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="variant-tag" id="variantTag"></div>

    <div class="quiz-container">

            <div class="options-area" id="tentativaOptions"></div>
        </div>

        <!-- STEP 6 -->
        <div class="step" id="step-6">

                <div class="chat-sender"><span class="dot"></span> CredPositivo</div>
                <div class="chat-bubble" id="educacaoBubble"></div>
            </div>
            <div class="options-area" id="educacaoArea"></div>
        </div>

        <!-- STEP 7 -->
        <div class="step" id="step-7">
            <div class="chat-area">
                <div class="chat-sender"><span class="dot"></span> CredPositivo</div>
                <div class="chat-bubble" id="contatoBubble"></div>
            </div>

        <!-- Resultado -->
        <div class="step" id="step-result">

        <div class="disclaimer">

            Seus dados est&atilde;o protegidos e n&atilde;o ser&atilde;o compartilhados.
        </div>

<script>
// ============================================================
// A/B Test — 50/50 split
// ============================================================
const WHATSAPP_NUMBER = '5571999999999'; // TROCAR pelo numero real

function getVariant() {
    const stored = localStorage.getItem('cp_quiz_variant');
    if (stored) return stored;
    const variant = Math.random() < 0.5 ? 'A' : 'B';
    localStorage.setItem('cp_quiz_variant', variant);
    return variant;
}

const VARIANT = getVariant();

// Only show variant tag with ?debug=1 (internal use)
if (new URLSearchParams(window.location.search).get('debug') === '1') {
    const tag = document.getElementById('variantTag');
    tag.style.display = 'block';
    tag.textContent = 'Variante ' + VARIANT;
}

// ============================================================
// Quiz data per variant
// ============================================================
const answers = {};
let currentStep = 0;

const VARIANT_A = {

        btn: 'Descobrir minha situa\u00e7\u00e3o'
    },
    steps: {

                { label: 'Tenho d\u00edvidas mas n\u00e3o estou negativado', value: 'dividas_nao_negativado', score: 20 },
                { label: 'N\u00e3o sei minha situa\u00e7\u00e3o', value: 'nao_sei', score: 15 }
            ]
        },
        2: {
            bubble: 'Voc\u00ea sabe o valor aproximado das suas pend\u00eancias?',

            key: 'valor',
            options: [
                { label: 'N\u00e3o tenho d\u00edvida \u2014 quero conseguir cr\u00e9dito', value: 'sem_divida', score: 5 },
                { label: 'At\u00e9 R$5.000', value: 'ate_5k', score: 10 },
                { label: 'R$5.000 a R$20.000', value: '5k_20k', score: 15 },
                { label: 'R$20.000 a R$50.000', value: '20k_50k', score: 20 },
                { label: 'Acima de R$50.000', value: 'acima_50k', score: 20 },

        3: {
            bubble: 'Onde aparecem restri\u00e7\u00f5es no seu CPF? <span style="color:var(--color-text-muted);font-size:14px;">(pode marcar mais de uma)</span>',
            type: 'multi',
            key: 'onde',
            options: [
                { label: 'Banco (Ita\u00fa, Bradesco, Santander, Caixa...)', value: 'banco', score: 10 },
                { label: 'Bir\u00f4s de cr\u00e9dito (\u00f3rg\u00e3os de prote\u00e7\u00e3o)', value: 'biros', score: 8 },
                { label: 'Financeira (cart\u00e3o de loja, credi\u00e1rio)', value: 'financeira', score: 6 },
                { label: 'Telefonia (Claro, Vivo, Tim)', value: 'telefonia', score: 3 },
                { label: 'N\u00e3o sei onde tenho restri\u00e7\u00e3o', value: 'nao_sei_onde', score: 5 },
                { label: 'N\u00e3o tenho restri\u00e7\u00e3o', value: 'sem_restricao', score: 0 }
            ]
        },
        4: {
            bubble: 'Voc\u00ea precisa de cr\u00e9dito ou financiamento nos pr\u00f3ximos meses?',
            type: 'single',
            key: 'urgencia',
            options: [
                { label: 'Sim, \u00e9 urgente \u2014 preciso resolver logo', value: 'urgente', score: 25 },
                { label: 'Sim, mas posso esperar um pouco', value: 'pode_esperar', score: 15 },

        5: {

        6: {

    hook: {

            type: 'contact',
            key: 'contato'

const CONFIG = VARIANT === 'A' ? VARIANT_A : VARIANT_B;

// ============================================================
// Render
// ============================================================
function init() {
    document.getElementById('hookBubble').innerHTML = CONFIG.hook.text;
    document.getElementById('hookBtn').textContent = CONFIG.hook.btn;
    updateProgress(0);
}

function updateProgress(step) {
    const total = CONFIG.totalSteps;
    const pct = Math.round((step / total) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
}

function showStep(stepNum) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));

    const stepConfig = CONFIG.steps[stepNum];
    if (!stepConfig) return;

    updateProgress(stepNum);

    if (stepConfig.type === 'single') {
        renderSingleStep(stepNum, stepConfig);
    } else if (stepConfig.type === 'multi') {
        renderMultiStep(stepNum, stepConfig);
    } else if (stepConfig.type === 'education') {
        renderEducationStep(stepNum, stepConfig);
    } else if (stepConfig.type === 'contact') {
        renderContactStep(stepNum, stepConfig);
    }
}

function renderSingleStep(stepNum, config) {
    const stepEl = document.getElementById('step-' + stepNum);
    const bubbleEl = stepEl.querySelector('.chat-bubble');
    const optionsEl = stepEl.querySelector('.options-area');

    bubbleEl.innerHTML = config.bubble;
    optionsEl.innerHTML = '';

    config.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = '<span class="option-marker"></span>' + opt.label;
        btn.onclick = function() {
            answers[config.key] = { value: opt.value, label: opt.label, score: opt.score };
            optionsEl.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            setTimeout(() => nextStep(stepNum + 1), 400);
        };
        optionsEl.appendChild(btn);
    });

    stepEl.classList.add('active');
}

function renderMultiStep(stepNum, config) {
    const stepEl = document.getElementById('step-' + stepNum);
    const bubbleEl = stepEl.querySelector('.chat-bubble');
    const optionsEl = stepEl.querySelector('.options-area');
    const continueBtn = document.getElementById(config.key + 'Btn');

    bubbleEl.innerHTML = config.bubble;
    optionsEl.innerHTML = '';

    const selected = new Set();

    config.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = '<span class="option-check"></span>' + opt.label;
        btn.onclick = function() {
            if (selected.has(opt.value)) {
                selected.delete(opt.value);
                btn.classList.remove('selected');
            } else {
                selected.add(opt.value);
                btn.classList.add('selected');
            }
            if (continueBtn) {
                continueBtn.classList.toggle('visible', selected.size > 0);
            }
        };
        optionsEl.appendChild(btn);
    });

    stepEl._multiData = { config, selected: selected, allOptions: config.options };
    stepEl.classList.add('active');
}

function submitMultiSelect(key) {
    const stepNum = Object.keys(CONFIG.steps).find(k => CONFIG.steps[k].key === key);
    const stepEl = document.getElementById('step-' + stepNum);
    const data = stepEl._multiData;

    const selectedOpts = data.allOptions.filter(o => data.selected.has(o.value));
    const totalScore = selectedOpts.reduce((sum, o) => sum + o.score, 0);

    answers[key] = {
        values: Array.from(data.selected),
        labels: selectedOpts.map(o => o.label),
        score: totalScore
    };

    nextStep(parseInt(stepNum) + 1);
}

function renderEducationStep(stepNum, config) {
    const stepEl = document.getElementById('step-' + stepNum);
    const bubbleEl = stepEl.querySelector('.chat-bubble');
    const areaEl = stepEl.querySelector('.options-area');

    bubbleEl.innerHTML = config.bubble;
    areaEl.innerHTML = '';

    const btn = document.createElement('button');
    btn.className = 'btn-continue visible';
    btn.textContent = 'Continuar';
    btn.onclick = () => nextStep(stepNum + 1);
    areaEl.appendChild(btn);

    stepEl.classList.add('active');
}

function renderContactStep(stepNum, config) {
    const stepEl = document.getElementById('step-' + stepNum);
    const bubbleEl = stepEl.querySelector('.chat-bubble');
    const areaEl = stepEl.querySelector('.options-area');

    bubbleEl.innerHTML = config.bubble;
    areaEl.innerHTML = `
        <div class="input-group">
            <label>Nome</label>
            <input type="text" id="inputNome" placeholder="Seu nome" autocomplete="name" required>
        </div>
        <div class="input-group">
            <label>WhatsApp</label>
            <input type="tel" id="inputWhatsapp" placeholder="(00) 00000-0000" autocomplete="tel" required>
        </div>
        <button class="btn-continue visible" onclick="submitContact()">Ver meu resultado</button>
    `;

    setTimeout(() => {
        const phoneInput = document.getElementById('inputWhatsapp');
        if (phoneInput) {
            phoneInput.addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '');
                if (v.length > 11) v = v.slice(0, 11);
                if (v.length > 7) {
                    v = '(' + v.slice(0,2) + ') ' + v.slice(2,7) + '-' + v.slice(7);
                } else if (v.length > 2) {
                    v = '(' + v.slice(0,2) + ') ' + v.slice(2);
                } else if (v.length > 0) {
                    v = '(' + v;
                }
                e.target.value = v;
            });
        }
    }, 100);

    stepEl.classList.add('active');
}

function submitContact() {
    const nome = document.getElementById('inputNome').value.trim();
    const whatsapp = document.getElementById('inputWhatsapp').value.trim();

    if (!nome) {
        document.getElementById('inputNome').focus();
        return;
    }
    if (whatsapp.replace(/\D/g, '').length < 10) {
        document.getElementById('inputWhatsapp').focus();
        return;
    }

    answers.nome = nome;
    answers.whatsapp = whatsapp;
    answers.variant = VARIANT;
    answers.timestamp = new Date().toISOString();

    sendToBackend(answers);
    showResult();
}

// ============================================================
// Scoring
// ============================================================
function calculateScore() {
    let total = 0;
    const maxScore = VARIANT === 'A' ? 100 : 90;

    Object.keys(answers).forEach(key => {
        if (answers[key] && typeof answers[key] === 'object' && answers[key].score !== undefined) {
            total += answers[key].score;
        }
    });

    return Math.min(Math.round((total / maxScore) * 100), 100);
}

function getScoreLevel(score) {
    if (score >= 70) return 'critical';
    if (score >= 40) return 'attention';
    return 'preventive';
}

// ============================================================
// Navigation
// ============================================================
function nextStep(stepNum) {
    if (!CONFIG.steps[stepNum]) {
        return;
    }

    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));

    const typingEl = document.createElement('div');
    typingEl.className = 'step active';
    typingEl.id = 'step-typing';
    typingEl.innerHTML = '<div class="chat-area"><div class="chat-sender"><span class="dot"></span> CredPositivo</div><div class="typing"><span></span><span></span><span></span></div></div>';
    document.querySelector('.quiz-container').insertBefore(typingEl, document.querySelector('.disclaimer'));

    setTimeout(() => {
        typingEl.remove();
        showStep(stepNum);
    }, 600 + Math.random() * 400);

    currentStep = stepNum;
}

// ============================================================
// Backend integration
// ============================================================
function sendToBackend(data) {
    const payload = {
        nome: data.nome,
        whatsapp: data.whatsapp,
        variant: data.variant,
        score: calculateScore(),
        level: getScoreLevel(calculateScore()),
        situacao: data.situacao ? (data.situacao.value || data.situacao) : null,
        valor: data.valor ? (data.valor.value || null) : null,
        onde: data.onde ? (data.onde.values || null) : null,
        urgencia: data.urgencia ? (data.urgencia.value || data.urgencia) : null,
        tentativa: data.tentativa ? (data.tentativa.value || null) : null,
        timestamp: data.timestamp,
        source: 'quiz_form',
        url: window.location.href
    };

    fetch('/api/quiz-lead', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    }).catch(() => {});
}

// ============================================================
// UTM tracking
// ============================================================
function getUTM() {
    const params = new URLSearchParams(window.location.search);
    return {
        utm_source: params.get('utm_source') || '',
        utm_medium: params.get('utm_medium') || '',
        utm_campaign: params.get('utm_campaign') || '',
        utm_content: params.get('utm_content') || '',
        utm_term: params.get('utm_term') || ''
    };
}

answers.utm = getUTM();

// Force variant via URL param (for testing)
const urlVariant = new URLSearchParams(window.location.search).get('v');
if (urlVariant === 'A' || urlVariant === 'B') {
    localStorage.setItem('cp_quiz_variant', urlVariant);
    if (VARIANT !== urlVariant) {
        window.location.reload();
    }
}

// ============================================================
// Init
// ============================================================
init();
