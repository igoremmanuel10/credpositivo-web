<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Agents | CredPositivo AI OS</title>
<meta name="description" content="Pixel art dashboard dos agentes IA do CredPositivo.">
<link rel="icon" href="../v2-assets/assets/images/logo.webp" type="image/webp">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0F1115;--augusto:#3B82F6;--paulo:#8B5CF6;--ana:#22C55E;
--luan:#F59E0B;--igor:#06B6D4;--alex:#EF4444;--musk:#EAB308;
--bia:#EC4899;--carol:#F472B6;--fernando:#14B8A6;
--vapi:#A855F7;--agenda:#0EA5E9;--coaching:#F97316;
--andre:#D946EF;--claudia:#FB923C;--brenda:#6366F1;
--glass:rgba(255,255,255,0.03);--glass-b:rgba(255,255,255,0.08);
--text:#FFFFFF;--text-m:#9CA3AF;--text-d:#6B7280;
}
body{background:var(--bg);color:var(--text);font-family:'Press Start 2P',monospace;
overflow:hidden;height:100vh;width:100vw;position:relative;cursor:default}
#office-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;
image-rendering:pixelated;image-rendering:crisp-edges}

/* HUD */
.hud{position:absolute;z-index:10;pointer-events:none}
.hud *{pointer-events:auto}

/* Top Bar */
.top-bar{top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;
padding:12px 20px;background:linear-gradient(180deg,rgba(15,17,21,0.95) 0%,rgba(15,17,21,0) 100%)}
.top-bar .brand{display:flex;align-items:center;gap:10px}
.top-bar .brand h1{font-size:14px;letter-spacing:1px;
background:linear-gradient(90deg,#22C55E,#06B6D4);-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.top-bar .status{display:flex;align-items:center;gap:16px;font-size:10px;color:var(--text-m)}
.status-dot{width:8px;height:8px;background:#6B7280;border-radius:50%;
animation:pulse-dot 2s infinite;display:inline-block;margin-right:4px}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.6)}50%{box-shadow:0 0 0 4px rgba(34,197,94,0)}}
.top-bar .clock{font-size:12px;font-variant-numeric:tabular-nums;color:#06B6D4}

/* Bottom Bar */
.bottom-bar{bottom:0;left:0;right:0;padding:0 20px 12px;
background:linear-gradient(0deg,rgba(15,17,21,0.95) 0%,rgba(15,17,21,0) 100%)}
.feed{display:flex;flex-direction:column;gap:3px;max-height:90px;overflow:hidden}
.feed-item{font-size:9px;color:var(--text-m);display:flex;align-items:center;gap:6px;
padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.02);
animation:feed-in 0.3s ease-out}
.feed-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.feed-item .time{color:var(--text-d);min-width:44px}
@keyframes feed-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Right Panel */
.right-panel{top:50px;right:0;bottom:0;width:280px;
background:rgba(15,17,21,0.9);border-left:1px solid var(--glass-b);
padding:12px 12px 60px;overflow-y:auto;transition:transform 0.3s ease;scrollbar-width:thin;
scrollbar-color:rgba(255,255,255,0.1) transparent}
.right-panel::-webkit-scrollbar{width:4px}
.right-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.right-panel::-webkit-scrollbar-track{background:transparent}
.right-panel.collapsed{transform:translateX(280px)}
.panel-toggle{position:absolute;top:50%;left:-28px;transform:translateY(-50%);
width:28px;height:48px;background:rgba(15,17,21,0.9);border:1px solid var(--glass-b);
border-right:none;border-radius:6px 0 0 6px;display:flex;align-items:center;
justify-content:center;cursor:pointer;color:var(--text-m);font-size:10px;transition:color 0.2s}
.panel-toggle:hover{color:var(--text)}
.panel-title{font-size:10px;color:var(--text-d);margin-bottom:10px;letter-spacing:1px}
.agent-card{padding:8px;border-radius:6px;border:1px solid transparent;margin-bottom:6px;
cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px}
.agent-card:hover,.agent-card.active{background:rgba(255,255,255,0.04);border-color:var(--glass-b)}
.agent-avatar{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;
justify-content:center;font-size:12px;flex-shrink:0}
.agent-info{flex:1;min-width:0}
.agent-info .name{font-size:9px;margin-bottom:2px}
.agent-info .role{font-size:7px;color:var(--text-d)}
.agent-status-ind{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.agent-metrics{margin-top:8px;padding:8px;background:rgba(255,255,255,0.02);
border-radius:6px;border:1px solid var(--glass-b);display:none}
.agent-card.active+.agent-metrics{display:block}
.metric-row{display:flex;justify-content:space-between;font-size:8px;padding:4px 0;
border-bottom:1px solid rgba(255,255,255,0.03)}
.metric-row:last-child{border:none}
.metric-val{color:#22C55E}
.sparkline{height:24px;margin-top:6px}

/* Agent control buttons */
.agent-controls{display:flex;gap:6px;margin-top:8px}
.ctrl-btn{flex:1;padding:5px 0;font-family:'Press Start 2P',monospace;font-size:7px;
border:1px solid var(--glass-b);border-radius:4px;cursor:pointer;
background:rgba(255,255,255,0.03);color:var(--text-m);transition:all 0.2s;letter-spacing:0.5px}
.ctrl-btn:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.ctrl-btn.start{border-color:#22C55E44;color:#22C55E}
.ctrl-btn.start:hover{background:#22C55E15}
.ctrl-btn.stop{border-color:#EF444444;color:#EF4444}
.ctrl-btn.stop:hover{background:#EF444415}

/* Sound toggle */
.sound-btn{position:absolute;top:12px;right:240px;z-index:20;width:32px;height:32px;
background:rgba(255,255,255,0.04);border:1px solid var(--glass-b);border-radius:6px;
color:var(--text-m);display:flex;align-items:center;justify-content:center;cursor:pointer;
font-size:14px;transition:all 0.2s}
.sound-btn:hover{color:var(--text);background:rgba(255,255,255,0.08)}
.sound-btn.collapsed-adj{right:20px}

/* Classic dashboard link */
.classic-link{position:fixed;bottom:14px;right:20px;z-index:20;font-size:8px;color:var(--text-d);
text-decoration:none;transition:color 0.2s;pointer-events:auto}
.classic-link:hover{color:var(--text-m)}

/* Mobile */
@media(max-width:768px){
.right-panel{width:100%;top:auto;bottom:0;left:0;right:0;height:50vh;
border-left:none;border-top:1px solid var(--glass-b);transform:translateY(calc(50vh - 40px))}
.right-panel.open{transform:translateY(0)}
.panel-toggle{top:-28px;left:50%;transform:translateX(-50%);width:48px;height:28px;
border-radius:6px 6px 0 0;border:1px solid var(--glass-b);border-bottom:none}
.sound-btn{right:12px;top:12px}
.sound-btn.collapsed-adj{right:12px}
.top-bar .brand h1{font-size:10px}
.top-bar{padding:8px 12px}
.bottom-bar{padding:0 12px 8px;bottom:40px}
}
</style>
</head>
<body>
<canvas id="office-canvas"></canvas>

<!-- Top Bar -->
<div class="hud top-bar">
 <div class="brand">
  <h1>CREDPOSITIVO AI OS</h1>
 </div>
 <div class="status">
  <span><span class="status-dot"></span><span id="api-status-label">Conectando...</span></span>
  <span id="agent-count">— Ativos</span>
 </div>
 <div class="clock" id="hud-clock">00:00:00</div>
</div>

<!-- Bottom Bar -->
<div class="hud bottom-bar">
 <div class="feed" id="activity-feed"></div>
</div>

<!-- Right Panel -->
<div class="hud right-panel" id="right-panel">
 <div class="panel-toggle" id="panel-toggle">&lt;</div>
 <div class="panel-title">AGENTES</div>
 <div id="agent-list"></div>
</div>

<!-- Classic link -->
<a href="/agentes/" class="hud classic-link">Dashboard Classico &rarr;</a>

<!-- Sound -->
<button class="sound-btn" id="sound-btn" title="Som">
 <i class="ph ph-speaker-slash"></i>
</button>

<script>
// ===== CONFIGURATION =====
const AGENTS = [
  {id:'musk',name:'Musk',role:'CEO',color:'#EAB308',
   room:'ceo',deskX:0,deskY:0},
  {id:'igor',name:'Igor',role:'Orchestrator',color:'#06B6D4',
   room:'control',deskX:0,deskY:0},
  {id:'augusto',name:'Augusto',role:'Closer',color:'#3B82F6',
   room:'main',deskX:0,deskY:0},
  {id:'paulo',name:'Paulo',role:'SDR',color:'#8B5CF6',
   room:'main',deskX:0,deskY:0},
  {id:'ana',name:'Ana',role:'Monitor',color:'#22C55E',
   room:'main',deskX:0,deskY:0},
  {id:'luan',name:'Luan',role:'Sales Manager',color:'#F59E0B',
   room:'break',deskX:0,deskY:0},
  {id:'alex',name:'Alex',role:'DevOps',color:'#EF4444',
   room:'server',deskX:0,deskY:0},
  {id:'bia',name:'Bia',role:'Social Media',color:'#EC4899',
   room:'break',deskX:0,deskY:0},
  {id:'carol',name:'Carol',role:'Trafego & Ads',color:'#F472B6',
   room:'main',deskX:0,deskY:0},
  {id:'fernando',name:'Fernando',role:'Relatorios',color:'#14B8A6',
   room:'main',deskX:0,deskY:0},
  {id:'vapi',name:'Vapi',role:'Voz & Ligacoes',color:'#A855F7',
   room:'server',deskX:0,deskY:0},
  {id:'agenda',name:'Agenda',role:'Agenda & Reunioes',color:'#0EA5E9',
   room:'control',deskX:0,deskY:0},
  {id:'coaching',name:'Tony Robbins',role:'Coach de Alta Performance',color:'#F97316',
   room:'ceo',deskX:0,deskY:0},
  {id:'andre',name:'Andre',role:'Copywriter',color:'#D946EF',
   room:'break',deskX:0,deskY:0},
  {id:'claudia',name:'Claudia',role:'Designer UX/UI',color:'#FB923C',
   room:'main',deskX:0,deskY:0},
  {id:'brenda',name:'Brenda',role:'Estrategista',color:'#6366F1',
   room:'control',deskX:0,deskY:0}
];

const SKIN_COLORS = ['#F5D0A9','#E8C39E','#D4A574','#C49A6C','#F5C6AA','#E0B896','#DEB887'];

// ===== CANVAS SETUP =====
const canvas = document.getElementById('office-canvas');
const ctx = canvas.getContext('2d');
let W, H, SCALE, PIXEL;
let officeW = 460, officeH = 330;
let offsetX = 0, offsetY = 0;
let frame = 0, slowFrame = 0, tick = 0;
let particles = [];
let selectedAgent = null;
let soundEnabled = false;
let audioCtx = null;
let apiConnected = false;
let dayProgress = 0;

// Agent runtime state
const agentStates = {};
AGENTS.forEach((a,i) => {
  const skin = SKIN_COLORS[i % SKIN_COLORS.length];
  agentStates[a.id] = {
    state:'idle', x:0, y:0, targetX:0, targetY:0,
    frame:0, msgTimer:0, currentMsg:'', bubbleAlpha:0,
    skin, walkDir:0, stateTimer: 9999,
    metrics:{},
    sparkline: Array.from({length:12},()=>0)
  };
});

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  SCALE = Math.min(W / officeW, H / officeH) * 0.95;
  PIXEL = Math.max(1, Math.floor(SCALE));
  const panelW = 280;
  offsetX = ((W - panelW) - officeW * SCALE) / 2;
  offsetY = (H - officeH * SCALE) / 2 - 10;
  assignDesks();
}
window.addEventListener('resize', resize);

// ===== OFFICE LAYOUT =====
// Rooms defined in virtual coords (officeW x officeH grid)
const ROOMS = {
  ceo:    {x:130,y:10,  w:160,h:70, label:'CEO OFFICE'},
  control:{x:8,  y:90, w:115,h:130, label:'CONTROL ROOM'},
  main:   {x:131,y:90, w:200,h:130, label:'MAIN OFFICE'},
  server: {x:339,y:90, w:113,h:130, label:'SERVER ROOM'},
  break_: {x:8,  y:230,w:115,h:90, label:'BREAK ROOM'}
};

const COFFEE_POS = {x:28, y:278};

function assignDesks() {
  const byId = {};
  AGENTS.forEach(a => { byId[a.id] = a; });

  // CEO room: Musk (center-left) + Coach (center-right)
  byId['musk'].deskX    = ROOMS.ceo.x + 55;  byId['musk'].deskY    = ROOMS.ceo.y + 35;
  byId['coaching'].deskX= ROOMS.ceo.x + 105; byId['coaching'].deskY= ROOMS.ceo.y + 35;

  // Control room: Igor (upper-center) + Brenda (mid-center) + Agenda (lower-center)
  byId['igor'].deskX    = ROOMS.control.x + 57; byId['igor'].deskY    = ROOMS.control.y + 30;
  byId['brenda'].deskX  = ROOMS.control.x + 57; byId['brenda'].deskY  = ROOMS.control.y + 68;
  byId['agenda'].deskX  = ROOMS.control.x + 57; byId['agenda'].deskY  = ROOMS.control.y + 106;

  // Main office: 3-top / 3-bottom arrangement (6 agents)
  const mx = ROOMS.main.x, my = ROOMS.main.y;
  byId['augusto'].deskX = mx + 28;  byId['augusto'].deskY = my + 32;
  byId['paulo'].deskX   = mx + 95;  byId['paulo'].deskY   = my + 32;
  byId['ana'].deskX     = mx + 162; byId['ana'].deskY     = my + 32;
  byId['carol'].deskX   = mx + 28;  byId['carol'].deskY   = my + 88;
  byId['fernando'].deskX= mx + 95;  byId['fernando'].deskY= my + 88;
  byId['claudia'].deskX = mx + 162; byId['claudia'].deskY = my + 88;

  // Server room: Alex (upper) + Vapi (lower)
  byId['alex'].deskX    = ROOMS.server.x + 56; byId['alex'].deskY    = ROOMS.server.y + 38;
  byId['vapi'].deskX    = ROOMS.server.x + 56; byId['vapi'].deskY    = ROOMS.server.y + 88;

  // Break room: Luan (upper-left) + Bia (upper-right) + Andre (lower-center)
  byId['luan'].deskX    = ROOMS.break_.x + 28; byId['luan'].deskY    = ROOMS.break_.y + 32;
  byId['bia'].deskX     = ROOMS.break_.x + 78; byId['bia'].deskY     = ROOMS.break_.y + 32;
  byId['andre'].deskX   = ROOMS.break_.x + 53; byId['andre'].deskY   = ROOMS.break_.y + 68;

  AGENTS.forEach(a => {
    const s = agentStates[a.id];
    if (s.state !== 'walking' && s.state !== 'coffee') {
      s.x = a.deskX; s.y = a.deskY;
      s.targetX = a.deskX; s.targetY = a.deskY;
    }
  });
}

// ===== DRAWING HELPERS =====
function px(x, y, w, h) {
  ctx.fillRect(
    Math.floor(offsetX + x * SCALE),
    Math.floor(offsetY + y * SCALE),
    Math.ceil(w * SCALE),
    Math.ceil(h * SCALE)
  );
}
function pxRect(x, y, w, h) {
  ctx.strokeRect(
    Math.floor(offsetX + x * SCALE) + 0.5,
    Math.floor(offsetY + y * SCALE) + 0.5,
    Math.ceil(w * SCALE),
    Math.ceil(h * SCALE)
  );
}

// ===== DRAW OFFICE =====
function drawFloor() {
  // Day/night cycle
  dayProgress = (dayProgress + 0.0001) % 1;
  const nightFactor = Math.sin(dayProgress * Math.PI * 2) * 0.15;

  // Floor tiles
  const tileSize = 8;
  for (let ty = 0; ty < officeH; ty += tileSize) {
    for (let tx = 0; tx < officeW; tx += tileSize) {
      const checker = ((tx / tileSize) + (ty / tileSize)) % 2 === 0;
      const base = checker ? 22 : 20;
      const v = base - nightFactor * 40;
      ctx.fillStyle = `rgb(${v},${v+1},${v+3})`;
      px(tx, ty, tileSize, tileSize);
    }
  }
}

function drawRooms() {
  ctx.lineWidth = 1;
  for (const [key, r] of Object.entries(ROOMS)) {
    // Room wall
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    pxRect(r.x, r.y, r.w, r.h);

    // Room fill
    ctx.fillStyle = key === 'ceo' ? 'rgba(234,179,8,0.02)' :
                    key === 'control' ? 'rgba(6,182,212,0.02)' :
                    key === 'server' ? 'rgba(239,68,68,0.02)' :
                    key === 'break_' ? 'rgba(34,197,94,0.02)' :
                    'rgba(255,255,255,0.01)';
    px(r.x+1, r.y+1, r.w-2, r.h-2);

    // Room label
    const sx = Math.floor(offsetX + (r.x + r.w/2) * SCALE);
    const sy = Math.floor(offsetY + r.y * SCALE) - 4;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = `${Math.max(9, SCALE * 3.5)}px 'Press Start 2P'`;
    ctx.textAlign = 'center';
    ctx.fillText(r.label, sx, sy);
  }
  ctx.textAlign = 'left';
}

function drawDoors() {
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  // CEO door (bottom wall)
  px(ROOMS.ceo.x + 60, ROOMS.ceo.y + ROOMS.ceo.h - 1, 25, 2);
  // Control door (right wall, connects to main office)
  px(ROOMS.control.x + ROOMS.control.w - 1, ROOMS.control.y + 45, 2, 22);
  // Server door (left wall, connects to main office)
  px(ROOMS.server.x, ROOMS.server.y + 45, 2, 22);
  // Break room door (top wall)
  px(ROOMS.break_.x + 40, ROOMS.break_.y, 22, 2);
}

function drawDesk(x, y, hasMonitor) {
  // Desk surface
  ctx.fillStyle = '#3D2B1F';
  px(x-8, y-2, 16, 8);
  // Desk edge
  ctx.fillStyle = '#2A1F16';
  px(x-8, y+5, 16, 2);
  // Monitor
  if (hasMonitor) {
    ctx.fillStyle = '#1a1a2e';
    px(x-4, y-6, 8, 5);
    // Screen glow
    const glowColors = ['#3B82F6','#22C55E','#8B5CF6','#06B6D4'];
    ctx.fillStyle = glowColors[Math.floor(tick/60) % glowColors.length] + '40';
    px(x-3, y-5, 6, 3);
    // Screen content flicker
    if (Math.random() > 0.5) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      px(x - 2 + Math.floor(Math.random()*4), y-4, 2, 1);
    }
    // Stand
    ctx.fillStyle = '#333';
    px(x-1, y-1, 2, 1);
  }
  // Chair
  ctx.fillStyle = '#1a1a1a';
  px(x-3, y+8, 6, 4);
  ctx.fillStyle = '#252525';
  px(x-2, y+7, 4, 1);
}

function drawServerRack(x, y) {
  ctx.fillStyle = '#1C1C2A';
  px(x, y, 10, 20);
  ctx.fillStyle = '#15151F';
  px(x+1, y+1, 8, 18);
  // Server slots
  for (let i = 0; i < 4; i++) {
    ctx.fillStyle = '#222233';
    px(x+2, y+2+i*4, 6, 3);
    // Blinking lights
    const on = (tick + i * 17) % 60 < 40;
    ctx.fillStyle = on ? '#22C55E' : '#0a2a0a';
    px(x+7, y+3+i*4, 1, 1);
    const on2 = (tick + i * 23) % 80 < 50;
    ctx.fillStyle = on2 ? '#3B82F6' : '#0a0a2a';
    px(x+6, y+3+i*4, 1, 1);
  }
}

function drawCoffeeMachine(x, y) {
  ctx.fillStyle = '#2a2a2a';
  px(x, y, 8, 10);
  ctx.fillStyle = '#3a3a3a';
  px(x+1, y+1, 6, 4);
  // Cup
  ctx.fillStyle = '#ddd';
  px(x+2, y+6, 4, 3);
  // Steam
  if (tick % 30 < 15) {
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    px(x+3, y-1, 1, 1);
    px(x+4, y-2, 1, 1);
  }
  // Coffee label
  ctx.fillStyle = '#6B4226';
  px(x+2, y+2, 4, 2);
}

function drawPlant(x, y) {
  // Pot
  ctx.fillStyle = '#8B4513';
  px(x, y+3, 5, 4);
  ctx.fillStyle = '#A0522D';
  px(x-1, y+3, 7, 1);
  // Leaves
  ctx.fillStyle = '#228B22';
  px(x+1, y, 3, 3);
  px(x-1, y+1, 2, 2);
  px(x+4, y+1, 2, 2);
  ctx.fillStyle = '#2ECC40';
  px(x+2, y-1, 1, 1);
}

function drawClock(x, y) {
  // Clock face
  ctx.fillStyle = '#222';
  px(x, y, 8, 8);
  ctx.fillStyle = '#fafafa';
  px(x+1, y+1, 6, 6);
  // Hands
  const now = new Date();
  const hr = now.getHours() % 12;
  const mn = now.getMinutes();
  ctx.fillStyle = '#111';
  // Hour hand
  const hx = Math.round(Math.cos((hr/12)*Math.PI*2 - Math.PI/2)*2);
  const hy = Math.round(Math.sin((hr/12)*Math.PI*2 - Math.PI/2)*2);
  px(x+4+hx, y+4+hy, 1, 1);
  // Minute hand
  ctx.fillStyle = '#EF4444';
  const mmx = Math.round(Math.cos((mn/60)*Math.PI*2 - Math.PI/2)*2.5);
  const mmy = Math.round(Math.sin((mn/60)*Math.PI*2 - Math.PI/2)*2.5);
  px(x+4+mmx, y+4+mmy, 1, 1);
  // Center
  ctx.fillStyle = '#111';
  px(x+3.5, y+3.5, 1, 1);

// ===== DRAW AGENTS =====
function drawAgent(agent, state) {
  const x = state.x, y = state.y;
  const f = state.frame;
  const col = agent.color;
  const isSelected = selectedAgent === agent.id;

  // Selection highlight
  if (isSelected) {
    ctx.fillStyle = col + '15';
    px(x-6, y-8, 12, 18);
    ctx.strokeStyle = col + '40';
    ctx.lineWidth = 1;
    pxRect(x-6, y-8, 12, 18);
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  px(x-3, y+5, 6, 2);

  if (state.state === 'sleeping') {
    // Sleeping - head on desk
    ctx.fillStyle = state.skin;
    px(x-2, y, 5, 3);
    ctx.fillStyle = col;
    px(x-2, y+3, 5, 3);
    // Zzz
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    const zOff = (tick % 60) / 60 * 3;
    px(x+4, y-2-zOff, 2, 2);
    if (tick % 60 > 20) px(x+5, y-5-zOff, 2, 2);
    return;
  }

  if (state.state === 'coffee') {
    // Standing with cup
    // Legs
    ctx.fillStyle = '#1a1a2e';
    px(x-2, y+3, 2, 3);
    px(x+1, y+3, 2, 3);
    // Body
    ctx.fillStyle = col;
    px(x-2, y-1, 5, 4);
    // Head
    ctx.fillStyle = state.skin;
    px(x-1, y-4, 3, 3);
    // Hair
    ctx.fillStyle = '#222';
    px(x-1, y-5, 3, 1);
    // Cup
    ctx.fillStyle = '#ddd';
    px(x+3, y+1, 2, 2);
    // Steam
    if (tick % 20 < 10) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      px(x+3, y-1, 1, 1);
    }
    return;
  }

  // Walking animation
  if (state.state === 'walking') {
    // Legs with walk cycle
    ctx.fillStyle = '#1a1a2e';
    if (f % 2 === 0) {
      px(x-2, y+3, 2, 3);
      px(x+1, y+4, 2, 2);
    } else {
      px(x-2, y+4, 2, 2);
      px(x+1, y+3, 2, 3);
    }
    // Body
    ctx.fillStyle = col;
    px(x-2, y-1, 5, 4);
    // Head
    ctx.fillStyle = state.skin;
    px(x-1, y-4, 3, 3);
    // Hair
    ctx.fillStyle = '#222';
    px(x-1, y-5, 3, 1);
    // Eyes (direction)
    ctx.fillStyle = '#111';
    if (state.walkDir > 0) px(x+1, y-3, 1, 1);
    else px(x-1, y-3, 1, 1);
    return;
  }

  // Sitting (idle / working / talking)
  // Legs tucked
  ctx.fillStyle = '#1a1a2e';
  px(x-2, y+3, 2, 2);
  px(x+1, y+3, 2, 2);

  // Body
  ctx.fillStyle = col;
  px(x-2, y-1, 5, 4);

  // Arms
  if (state.state === 'working' && f % 2 === 0) {
    // Typing - arms extended
    ctx.fillStyle = state.skin;
    px(x-3, y+1, 1, 1);
    px(x+3, y+1, 1, 1);
    // Tiny typing particles
    if (Math.random() > 0.85) {
      ctx.fillStyle = col + '40';
      px(x - 3 + Math.random()*7, y-2, 1, 1);
    }
  } else {
    ctx.fillStyle = state.skin;
    px(x-3, y, 1, 2);
    px(x+3, y, 1, 2);
  }

  // Head
  ctx.fillStyle = state.skin;
  px(x-1, y-4, 3, 3);

  // Hair
  ctx.fillStyle = '#222';
  px(x-1, y-5, 3, 1);
  px(x-2, y-4, 1, 1);

  // Eyes
  ctx.fillStyle = '#111';
  const blink = tick % 120 < 3;
  if (!blink) {
    px(x-1, y-3, 1, 1);
    px(x+1, y-3, 1, 1);
  }

  // Alert indicator
  if (state.state === 'alert') {
    const flash = tick % 30 < 15;
    if (flash) {
      ctx.fillStyle = '#EF4444';
      px(x, y-8, 1, 3);
      px(x, y-4, 1, 1);
    }
  }

  // Name tag
  if (isSelected || state.state === 'talking') {
    const sx = Math.floor(offsetX + x * SCALE);
    const sy = Math.floor(offsetY + (y + 9) * SCALE);
    ctx.fillStyle = col + 'cc';
    ctx.font = `${Math.max(8, SCALE * 3)}px 'Press Start 2P'`;
    ctx.textAlign = 'center';
    ctx.fillText(agent.name, sx, sy);
    ctx.textAlign = 'left';
  }
}

function drawSpeechBubble(agent, state) {
  if (!state.currentMsg || state.bubbleAlpha <= 0) return;

  const x = state.x, y = state.y;
  const msg = state.currentMsg;
  const alpha = Math.min(1, state.bubbleAlpha);

  const fontSize = Math.max(7, SCALE * 2.8);
  ctx.font = `${fontSize}px 'Press Start 2P'`;
  const tw = ctx.measureText(msg).width;
  const bw = tw + 8;
  const bh = fontSize + 6;
  const bx = Math.floor(offsetX + x * SCALE - bw/2);
  const by = Math.floor(offsetY + (y - 12) * SCALE - bh);

  ctx.globalAlpha = alpha;
  // Bubble background
  ctx.fillStyle = '#111';
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = agent.color;
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
  // Tail
  ctx.fillStyle = '#111';
  ctx.fillRect(bx + bw/2 - 2, by + bh, 4, 3);
  // Text
  ctx.fillStyle = '#eee';
  ctx.textAlign = 'center';
  ctx.fillText(msg, bx + bw/2, by + bh - 4);
  ctx.textAlign = 'left';
  ctx.globalAlpha = 1;
}

// ===== PARTICLES =====
function spawnParticle() {
  if (particles.length > 30) return;
  particles.push({
    x: Math.random() * officeW,
    y: Math.random() * officeH,
    vx: (Math.random()-0.5)*0.1,
    vy: -Math.random()*0.05 - 0.02,
    life: 200 + Math.random()*200,
    maxLife: 200 + Math.random()*200,
    size: 0.5 + Math.random()
  });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    const a = (p.life / p.maxLife) * 0.08;
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    px(p.x, p.y, p.size, p.size);
  }
}

// ===== SCREEN GLOW EFFECTS =====
function drawScreenGlows() {
  // Subtle glow around monitors
  AGENTS.forEach(a => {
    const s = agentStates[a.id];
    if (s.state === 'working' || s.state === 'idle' || s.state === 'talking') {
      const gx = Math.floor(offsetX + a.deskX * SCALE);
      const gy = Math.floor(offsetY + (a.deskY - 6) * SCALE);
      const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, 15 * SCALE);
      grad.addColorStop(0, a.color + '08');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(gx - 20*SCALE, gy - 15*SCALE, 40*SCALE, 30*SCALE);
    }
  });
}

// ===== STATE MACHINE =====
function updateAgentStates() {
  AGENTS.forEach(a => {
    const s = agentStates[a.id];

    // Frame animation (every ~500ms at 60fps)
    if (tick % 30 === 0) s.frame = (s.frame + 1) % 2;

    // Bubble fade
    if (s.bubbleAlpha > 0 && s.msgTimer <= 0) {
      s.bubbleAlpha -= 0.02;
    }
    if (s.msgTimer > 0) s.msgTimer--;

    // Movement
    const dx = s.targetX - s.x;
    const dy = s.targetY - s.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 0.5) {
      const speed = 0.4;
      s.x += (dx/dist) * speed;
      s.y += (dy/dist) * speed;
      s.walkDir = dx > 0 ? 1 : -1;
    } else if (s.state === 'walking') {
      if (s._nextState) {
        s.state = s._nextState;
        s._nextState = null;
        s.stateTimer = 80 + Math.random() * 100;
      } else {
        s.targetX = a.deskX;
        s.targetY = a.deskY;
        if (Math.abs(s.x - a.deskX) < 1 && Math.abs(s.y - a.deskY) < 1) {
          s.state = 'idle';
        }
      }
    }

  });
}

// ===== RIGHT PANEL =====
function buildAgentList() {
  const el = document.getElementById('agent-list');
  el.innerHTML = AGENTS.map(a => {
    const s = agentStates[a.id];
    const active = selectedAgent === a.id ? ' active' : '';
    return `
    <div class="agent-card${active}" data-agent="${a.id}" onclick="selectAgent('${a.id}')">
      <div class="agent-avatar" style="background:${a.color}20;color:${a.color}">${a.name[0]}</div>
      <div class="agent-info">
        <div class="name" style="color:${a.color}">${a.name}</div>
        <div class="role">${a.role}</div>
      </div>
      <div class="agent-status-ind" style="background:${s.state==='sleeping'?'#EF4444':s.state==='alert'?'#F59E0B':'#22C55E'}"></div>
    </div>
    <div class="agent-metrics" ${selectedAgent===a.id?'style="display:block"':''}>
      ${getAgentMetricRows(a, s)}
      <canvas class="sparkline" data-agent="${a.id}" width="240" height="24"></canvas>
      <div class="agent-controls">
        <button class="ctrl-btn start" onclick="controlAgent(event,'${a.id}','start')">START</button>
        <button class="ctrl-btn stop"  onclick="controlAgent(event,'${a.id}','stop')">STOP</button>
      </div>
    </div>`;
  }).join('');

  // Draw sparklines
  AGENTS.forEach(a => {
    const c = el.querySelector(`.sparkline[data-agent="${a.id}"]`);
    if (!c) return;
    const sctx = c.getContext('2d');
    const data = agentStates[a.id].sparkline;
    sctx.clearRect(0,0,180,16);
    sctx.strokeStyle = a.color + '80';
    sctx.lineWidth = 1;
    sctx.beginPath();
    data.forEach((v,i) => {
      const x = (i/(data.length-1))*178+1;
      const y = 14 - v*12;
      i===0 ? sctx.moveTo(x,y) : sctx.lineTo(x,y);
    });
    sctx.stroke();
    // Fill under
    sctx.lineTo(179, 15);
    sctx.lineTo(1, 15);
    sctx.closePath();
    sctx.fillStyle = a.color + '10';
    sctx.fill();
  });
}

function selectAgent(id) {
  selectedAgent = selectedAgent === id ? null : id;
  buildAgentList();
}

function controlAgent(evt, agentId, action) {
  evt.stopPropagation();
  const btn = evt.currentTarget;
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '...';
  fetch(`/api/os/agents/${agentId}/control`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action})
  })
  .then(r => r.json())
  .then(() => {
    const s = agentStates[agentId];
    if (s) s.state = action === 'start' ? 'working' : 'sleeping';
    const agent = AGENTS.find(a => a.id === agentId);
    const label = action === 'start' ? 'iniciado' : 'parado';
    if (agent) addRawFeedEvent(null, agent.color, agent.name, label);
    buildAgentList();
  })
  .catch(() => {
    btn.disabled = false;
    btn.textContent = origText;
  });
}

// ===== SOUND =====
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playKeyClick() {
  if (!soundEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.value = 800 + Math.random()*400;
  osc.type = 'square';
  gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
  osc.start(); osc.stop(audioCtx.currentTime + 0.05);
}

function playNotif() {
  if (!soundEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.value = 1200;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.start(); osc.stop(audioCtx.currentTime + 0.15);
}

// ===== API STATUS =====

// ===== API CONNECTION =====
function connectAPI() {
  // Try SSE with named event support
  try {
    const evtSource = new EventSource('/api/os/events/stream');

    // Handle named "os" events
    evtSource.addEventListener('os', (event) => {
      try {
        const data = JSON.parse(event.data);
        handleSSEEvent(data);
        setAPIStatus(true);
      } catch(e) {}
    });

    // Fallback for unnamed messages
    evtSource.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        handleSSEEvent(data);
        setAPIStatus(true);
      } catch(e) {}
    };

    evtSource.onerror = () => { setAPIStatus(false); };
  } catch(e) { setAPIStatus(false); }

  // Try initial state
  fetch('/api/os/pixel-state')
    .then(r => r.json())
    .then(data => {
      if (data && data.ok && data.agents) {
        data.agents.forEach(ad => {
          // Map API agent onto AGENTS array (update role/color if present)
          const agentDef = AGENTS.find(a => a.id === ad.id);
          if (agentDef) {
            if (ad.name)  agentDef.name  = ad.name;
            if (ad.role)  agentDef.role  = ad.role;
            if (ad.color) agentDef.color = ad.color;
          }

          const s = agentStates[ad.id];
          if (!s) return;

          // Map API status/animation to internal state
          if (ad.status === 'online' || ad.animation === 'typing') {
            s.state = 'working';
          } else if (ad.status === 'idle') {
            s.state = 'idle';
          } else if (ad.status === 'offline') {
            s.state = 'sleeping';
          } else if (ad.animation) {
            s.state = ad.animation;
          }

          // Show bubble from API
          if (ad.bubble) {
            s.currentMsg = ad.bubble;
            s.msgTimer = 150;
            s.bubbleAlpha = 1;
          }

          // Map metrics — normalize all snake_case API keys to camelCase
          if (ad.metrics) {
            const m = ad.metrics;
            // Common fields
            if (m.conversations_today  != null) s.metrics.conversations      = m.conversations_today;
            if (m.avg_response_time    != null) s.metrics.responseTime        = m.avg_response_time;
            if (m.conversion_rate      != null) s.metrics.conversion          = m.conversion_rate;
            // Augusto
            if (m.conversion_rate      != null) s.metrics.conversionRate      = m.conversion_rate;
            // Paulo
            if (m.leads_qualified      != null) s.metrics.qualified           = m.leads_qualified;
            if (m.follow_ups           != null) s.metrics.followups            = m.follow_ups;
            // Ana / Igor
            if (m.cycles_run           != null) s.metrics.cycles              = m.cycles_run;
            if (m.issues_found         != null) s.metrics.problems             = m.issues_found;
            if (m.fixes_applied        != null) s.metrics.corrections          = m.fixes_applied;
            if (m.conversations_checked!= null) s.metrics.verified            = m.conversations_checked;
            // Alex
            if (m.system_status        != null) s.metrics.systemStatus         = m.system_status;
            if (m.error_count          != null) s.metrics.errors               = m.error_count;
            if (m.auto_fixes           != null) s.metrics.fixes                = m.auto_fixes;
            // Luan
            if (m.reports_today        != null) s.metrics.reportsToday         = m.reports_today;
            // Musk
            if (m.directives_today     != null) s.metrics.directivesToday      = m.directives_today;
            // Bia
            if (m.posts_today          != null) s.metrics.postsToday           = m.posts_today;
            if (m.engagement           != null) s.metrics.engagement            = m.engagement;
            // Carol
            if (m.campaigns            != null) s.metrics.campaigns             = m.campaigns;
            if (m.spend                != null) s.metrics.spend                 = m.spend;
            if (m.cpl                  != null) s.metrics.cpl                   = m.cpl;
            // Fernando
            if (m.reports_today        != null) s.metrics.reportsToday         = m.reports_today;
            // Vapi
            if (m.calls_today          != null) s.metrics.callsToday            = m.calls_today;
            // Agenda
            if (m.events_today         != null) s.metrics.eventsToday           = m.events_today;
            if (m.reminders            != null) s.metrics.reminders              = m.reminders;
            // Coach
            if (m.checkins_today       != null) s.metrics.checkinsToday         = m.checkins_today;
            // Also accept camelCase directly (if backend sends camelCase)
            Object.assign(s.metrics, m);
          }
        });

        // Update office active count
        if (data.office && typeof data.office.activeCount === 'number') {
          document.getElementById('agent-count').textContent =
            `${data.office.activeCount}/${AGENTS.length} Ativos`;
        }

        setAPIStatus(true);
        buildAgentList();
      }
    })
    .catch(() => { setAPIStatus(false); });
}

// ===== SSE EVENT HANDLER =====
function handleSSEEvent(data) {
  if (!data || !data.type) return;

  switch (data.type) {

    // --- Core agent events ---
    case 'agent.activity': {
      const agentId = data.agentId;
      const s = agentStates[agentId];
      if (!s) return;
      const action = (data.payload && data.payload.action) ? data.payload.action : '';
      s.state = 'working';
      if (action) {
        s.currentMsg = action;
        s.msgTimer = 150;
        s.bubbleAlpha = 1;
      }
      const agent = AGENTS.find(a => a.id === agentId);
      if (agent && action) addFeedEventFromSSE(agent, action);
      break;
    }
    case 'agent.tick': {
      const agentId = data.agentId;
      const s = agentStates[agentId];
      if (!s) return;
      const prevState = s.state;
      s.state = 'working';
      s.stateTimer = 90;
      s._nextState = prevState === 'working' ? 'idle' : prevState;
      break;
    }

    // --- Per-agent cycle/status events ---
    case 'ana.cycle_complete': {
      const s = agentStates['ana'];
      if (!s) break;
      const problems = data.payload && data.payload.problems != null ? data.payload.problems : null;
      const msg = problems > 0 ? `${problems} problemas detectados` : 'Tudo limpo';
      s.state = problems > 0 ? 'alert' : 'working';
      s.currentMsg = msg; s.msgTimer = 180; s.bubbleAlpha = 1;
      const ana = AGENTS.find(a => a.id === 'ana');
      if (ana) addFeedEventFromSSE(ana, msg);
      if (data.payload && data.payload.metrics) {
        Object.assign(s.metrics, data.payload.metrics);
        buildAgentList();
      }
      break;
    }
    case 'alex.health_check': {
      const s = agentStates['alex'];
      if (!s) break;
      const errs = data.payload && data.payload.errors != null ? data.payload.errors : null;
      const ok = !errs || errs === 0;
      const msg = ok ? 'Sistema OK' : `ALERTA: ${errs} erros`;
      s.state = ok ? 'working' : 'alert';
      s.currentMsg = msg; s.msgTimer = 180; s.bubbleAlpha = 1;
      const alex = AGENTS.find(a => a.id === 'alex');
      if (alex) addFeedEventFromSSE(alex, msg);
      if (data.payload && data.payload.metrics) {
        Object.assign(s.metrics, data.payload.metrics);
        buildAgentList();
      }
      break;
    }
    case 'igor.cycle_complete': {
      const s = agentStates['igor'];
      if (!s) break;
      const checked = data.payload && data.payload.checked != null ? data.payload.checked : 0;
      const msg = `${checked} conversas verificadas`;
      s.state = 'working';
      s.currentMsg = msg; s.msgTimer = 150; s.bubbleAlpha = 1;
      const igor = AGENTS.find(a => a.id === 'igor');
      if (igor) addFeedEventFromSSE(igor, msg);
      if (data.payload && data.payload.metrics) {
        Object.assign(s.metrics, data.payload.metrics);
        buildAgentList();
      }
      break;
    }
    case 'luan.report_generated': {
      const s = agentStates['luan'];
      if (!s) break;
      const msg = 'Relatorio enviado';
      s.state = 'working';
      s.currentMsg = msg; s.msgTimer = 150; s.bubbleAlpha = 1;
      const luan = AGENTS.find(a => a.id === 'luan');
      if (luan) addFeedEventFromSSE(luan, msg);
      if (data.payload && data.payload.metrics) {
        Object.assign(s.metrics, data.payload.metrics);
        buildAgentList();
      }
      break;
    }
    case 'musk.directive': {
      const s = agentStates['musk'];
      if (!s) break;
      const msg = 'Nova diretiva';
      s.state = 'talking';
      s.currentMsg = msg; s.msgTimer = 180; s.bubbleAlpha = 1;
      const musk = AGENTS.find(a => a.id === 'musk');
      if (musk) addFeedEventFromSSE(musk, msg);
      if (data.payload && data.payload.metrics) {
        Object.assign(s.metrics, data.payload.metrics);
        buildAgentList();
      }
      break;
    }
    case 'paulo.followup_processed': {
      const s = agentStates['paulo'];
      if (!s) break;
      const count = data.payload && data.payload.count != null ? data.payload.count : 0;
      const msg = `${count} follow-ups`;
      s.state = 'working';
      s.currentMsg = msg; s.msgTimer = 150; s.bubbleAlpha = 1;
      const paulo = AGENTS.find(a => a.id === 'paulo');
      if (paulo) addFeedEventFromSSE(paulo, msg);
      if (data.payload && data.payload.metrics) {
        Object.assign(s.metrics, data.payload.metrics);
        buildAgentList();
      }
      break;
    }

    // --- New agent events ---
    case 'bia.content_generated': {
      const s = agentStates['bia'];
      if (!s) break;
      const msg = 'Conteudo criado';
      s.state = 'working';
      s.currentMsg = msg; s.msgTimer = 150; s.bubbleAlpha = 1;
      const bia = AGENTS.find(a => a.id === 'bia');
      if (bia) addFeedEventFromSSE(bia, msg);
      if (data.payload && data.payload.metrics) { Object.assign(s.metrics, data.payload.metrics); buildAgentList(); }
      break;
    }
    case 'bia.post_published': {
      const s = agentStates['bia'];
      if (!s) break;
      const msg = 'Post publicado!';
      s.state = 'talking';
      s.currentMsg = msg; s.msgTimer = 180; s.bubbleAlpha = 1;
      const bia = AGENTS.find(a => a.id === 'bia');
      if (bia) addFeedEventFromSSE(bia, msg);
      if (data.payload && data.payload.metrics) { Object.assign(s.metrics, data.payload.metrics); buildAgentList(); }
      break;
    }
    case 'carol.ads_check': {
      const s = agentStates['carol'];
      if (!s) break;
      const msg = 'Campanhas verificadas';
      s.state = 'working';
      s.currentMsg = msg; s.msgTimer = 150; s.bubbleAlpha = 1;
      const carol = AGENTS.find(a => a.id === 'carol');
      if (carol) addFeedEventFromSSE(carol, msg);
      if (data.payload && data.payload.metrics) { Object.assign(s.metrics, data.payload.metrics); buildAgentList(); }
      break;
    }
    case 'fernando.report_sent': {
      const s = agentStates['fernando'];
      if (!s) break;
      const msg = 'Relatorio enviado';
      s.state = 'working';
      s.currentMsg = msg; s.msgTimer = 150; s.bubbleAlpha = 1;
      const fernando = AGENTS.find(a => a.id === 'fernando');
      if (fernando) addFeedEventFromSSE(fernando, msg);
      if (data.payload && data.payload.metrics) { Object.assign(s.metrics, data.payload.metrics); buildAgentList(); }
      break;
    }
    case 'vapi.call_scheduled': {
      const s = agentStates['vapi'];
      if (!s) break;
      const msg = 'Ligacao agendada';
      s.state = 'working';
      s.currentMsg = msg; s.msgTimer = 150; s.bubbleAlpha = 1;
      const vapi = AGENTS.find(a => a.id === 'vapi');
      if (vapi) addFeedEventFromSSE(vapi, msg);
      if (data.payload && data.payload.metrics) { Object.assign(s.metrics, data.payload.metrics); buildAgentList(); }
      break;
    }
    case 'agenda.reminder_sent': {
      const s = agentStates['agenda'];
      if (!s) break;
      const msg = 'Lembrete enviado';
      s.state = 'working';
      s.currentMsg = msg; s.msgTimer = 150; s.bubbleAlpha = 1;
      const agendaAgent = AGENTS.find(a => a.id === 'agenda');
      if (agendaAgent) addFeedEventFromSSE(agendaAgent, msg);
      if (data.payload && data.payload.metrics) { Object.assign(s.metrics, data.payload.metrics); buildAgentList(); }
      break;
    }
    case 'agenda.daily_agenda': {
      const s = agentStates['agenda'];
      if (!s) break;
      const msg = 'Agenda do dia';
      s.state = 'talking';
      s.currentMsg = msg; s.msgTimer = 180; s.bubbleAlpha = 1;
      const agendaAgent = AGENTS.find(a => a.id === 'agenda');
      if (agendaAgent) addFeedEventFromSSE(agendaAgent, msg);
      if (data.payload && data.payload.metrics) { Object.assign(s.metrics, data.payload.metrics); buildAgentList(); }
      break;
    }
    case 'coaching.checkin_sent': {
      const s = agentStates['coaching'];
      if (!s) break;
      const msg = 'Check-in enviado';
      s.state = 'working';
      s.currentMsg = msg; s.msgTimer = 150; s.bubbleAlpha = 1;
      const coaching = AGENTS.find(a => a.id === 'coaching');
      if (coaching) addFeedEventFromSSE(coaching, msg);
      if (data.payload && data.payload.metrics) { Object.assign(s.metrics, data.payload.metrics); buildAgentList(); }
      break;
    }

    // --- Workflow events ---
    case 'workflow.alert': {
      const wMsg = (data.payload && data.payload.message) ? data.payload.message : 'Alerta de workflow';
      addRawFeedEvent(null, '#EF4444', 'WORKFLOW', wMsg);
      break;
    }
    case 'workflow.escalation': {
      const wMsg = (data.payload && data.payload.message) ? data.payload.message : 'Escalacao de workflow';
      addRawFeedEvent(null, '#F59E0B', 'WORKFLOW', wMsg);
      break;
    }
    case 'workflow.recovery': {
      const wMsg = (data.payload && data.payload.message) ? data.payload.message : 'Workflow recuperado';
      addRawFeedEvent(null, '#22C55E', 'WORKFLOW', wMsg);
      break;
    }

    // --- Generic metrics update ---
    case 'agent.metrics': {
      const agentId = data.agentId;
      const s = agentStates[agentId];
      if (!s || !data.payload) break;
      Object.assign(s.metrics, data.payload);
      if (s.sparkline && typeof data.payload.sparkPoint === 'number') {
        s.sparkline.push(data.payload.sparkPoint);
        if (s.sparkline.length > 12) s.sparkline.shift();
      }
      buildAgentList();
      break;
    }

    case 'os.boot': {
      addRawFeedEvent(null, '#22C55E', 'Sistema', 'iniciado');
      break;
    }
    default:
      // Unknown event type — treat as generic agent activity if agentId present
      if (data.agentId) handleSSEEvent({...data, type: 'agent.activity'});
  }
}

// Add feed event from SSE (takes explicit message string)
function addFeedEventFromSSE(agent, msg) {
  const now = new Date();
  const time = now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  feedItems.unshift({time, name: agent.name, msg, color: agent.color});
  if (feedItems.length > 5) feedItems.pop();
  renderFeed();
}

// Add a raw feed item (for system events with no agent)
function addRawFeedEvent(agent, color, name, msg) {
  const now = new Date();
  const time = now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  feedItems.unshift({time, name, msg, color});
  if (feedItems.length > 5) feedItems.pop();
  renderFeed();
}

function updateAgentFromAPI(data) {
  // Legacy shim — kept so any external callers still work
  handleSSEEvent({type: 'agent.activity', agentId: data.agentId,
    payload: {action: data.message}, metrics: data.metrics});
}

// ===== CANVAS CLICK =====
canvas.addEventListener('click', (e) => {
  const mx = (e.clientX - offsetX) / SCALE;
  const my = (e.clientY - offsetY) / SCALE;
  let closest = null, closestDist = 15;
  AGENTS.forEach(a => {
    const s = agentStates[a.id];
    const d = Math.sqrt((s.x-mx)**2 + (s.y-my)**2);
    if (d < closestDist) { closest = a.id; closestDist = d; }
  });
  selectAgent(closest);
});

// ===== MAIN LOOP =====
function render() {
  tick++;

  // Clear
  ctx.fillStyle = '#0F1115';
  ctx.fillRect(0, 0, W, H);

  // Subtle vignette
  const vg = ctx.createRadialGradient(W/2, H/2, W*0.2, W/2, H/2, W*0.7);
  vg.addColorStop(0, 'transparent');
  vg.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  drawFloor();
  drawRooms();
  drawDoors();
  drawFurniture();
  drawScreenGlows();

  // Spawn dust particles
  if (tick % 15 === 0) spawnParticle();
  updateParticles();

  // Update & draw agents (sorted by Y for depth)
  updateAgentStates();

  const sorted = [...AGENTS].sort((a,b) => agentStates[a.id].y - agentStates[b.id].y);
  sorted.forEach(a => {
    const s = agentStates[a.id];
    drawAgent(a, s);
    drawSpeechBubble(a, s);
  });

  // Sound: random key clicks
  if (soundEnabled && tick % 8 === 0) {
    const typing = AGENTS.some(a => agentStates[a.id].state === 'working');
    if (typing && Math.random() > 0.5) playKeyClick();
  }

  // Update clock
  if (tick % 60 === 0) updateClock();

  // Refresh panel periodically
  if (tick % 180 === 0) {
    buildAgentList();
  }

  requestAnimationFrame(render);
}

// ===== INIT =====
resize();
updateClock();
buildAgentList();
renderFeed();
connectAPI();

render();
