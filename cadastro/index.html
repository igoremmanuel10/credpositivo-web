<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CredPositivo | Criar Conta</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../v2-assets/styles/layout.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background-color: #050505;
        }

        .register-container {
            width: 100%;
            max-width: 450px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-section img {
            height: 50px;
            width: auto;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="register-container">
        <div class="logo-section">
            <img src="../v2-assets/assets/images/logo.webp" alt="CredPositivo">
            <h1 style="font-size: 24px; margin-top: 16px;">Criar sua <span style="color: var(--color-primary);">Conta
                    Única</span></h1>
            <p style="color: var(--color-text-muted); font-size: 14px;">Um só acesso para todos os serviços
                CredPositivo.</p>
        </div>

        <div class="glass-card" style="padding: 32px;">
            <form id="registroForm" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="reg_nome" placeholder="Seu nome completo" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>CPF</label>
                        <input type="text" id="reg_cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div class="form-group">
                        <label>WhatsApp</label>
                        <input type="tel" id="reg_tel" placeholder="(00) 00000-0000" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="reg_email" placeholder="seu@email.com" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="reg_pass" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Confirmar Senha</label>
                        <input type="password" id="reg_pass2" placeholder="••••••••" required>
                    </div>
                </div>

                <div
                    style="margin: 20px 0; display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--color-text-muted);">
                    <input type="checkbox" id="reg_terms" required style="margin-top: 3px;">
                    <label for="reg_terms">Ao criar a conta, concordo com os <a href="../terms.html"
                            style="color: var(--color-primary);">Termos de Uso</a> e <a href="../privacy.html"
                            style="color: var(--color-primary);">Política de Privacidade</a>.</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Finalizar Cadastro</button>

                <p style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--color-text-muted);">
                    Já tem uma conta? <a href="../login/" style="color: var(--color-primary); font-weight: 600;">Faça
                        Login</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        async function handleRegister(e) {
            e.preventDefault();

            const nome = document.getElementById('reg_nome').value.trim();
            const cpf = document.getElementById('reg_cpf').value.trim();
            const email = document.getElementById('reg_email').value.trim();
            const tel = document.getElementById('reg_tel').value.trim();
            const pass = document.getElementById('reg_pass').value;
            const pass2 = document.getElementById('reg_pass2').value;

            if (pass.length < 6) {
                showError('A senha deve ter no mínimo 6 caracteres.');
                return false;
            }

            if (pass !== pass2) {
                showError('As senhas não coincidem!');
                return false;
            }

            const btn = document.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Cadastrando...';

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome,
                        cpf: cpf.replace(/\D/g, ''),
                        email,
                        telefone: tel.replace(/\D/g, ''),
                        senha: pass
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Erro ao cadastrar. Tente novamente.');
                    btn.disabled = false;
                    btn.textContent = 'Finalizar Cadastro';
                    return false;
                }

                localStorage.setItem('credpositivo_sessao', JSON.stringify(data.user || data));
                window.location.href = '../login/?cadastro=sucesso';
            } catch (err) {
                showError('Erro de conexao. Verifique sua internet e tente novamente.');
                btn.disabled = false;
                btn.textContent = 'Finalizar Cadastro';
            }

            return false;
        }

        function showError(msg) {
            let el = document.getElementById('registerError');
            if (!el) {
                el = document.createElement('div');
                el.id = 'registerError';
                el.style.cssText = 'background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#ef4444;';
                document.getElementById('registroForm').prepend(el);
            }
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>

</html>
