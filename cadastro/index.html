<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CredPositivo | Criar Conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../v2-assets/styles/layout.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background-color: #050505;
        }

        .register-container {
            width: 100%;
            max-width: 450px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-section img {
            height: 50px;
            width: auto;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="register-container">
        <div class="logo-section">
            <img src="../v2-assets/assets/images/logo.png" alt="CredPositivo">
            <h1 style="font-size: 24px; margin-top: 16px;">Criar sua <span style="color: var(--color-primary);">Conta
                    Única</span></h1>
            <p style="color: var(--color-text-muted); font-size: 14px;">Um só acesso para todos os serviços
                CredPositivo.</p>
        </div>

        <div class="glass-card" style="padding: 32px;">
            <form id="registroForm" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="reg_nome" placeholder="Seu nome completo" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>CPF</label>
                        <input type="text" id="reg_cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div class="form-group">
                        <label>WhatsApp</label>
                        <input type="tel" id="reg_tel" placeholder="(00) 00000-0000" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="reg_email" placeholder="seu@email.com" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="reg_pass" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Confirmar Senha</label>
                        <input type="password" id="reg_pass2" placeholder="••••••••" required>
                    </div>
                </div>

                <div
                    style="margin: 20px 0; display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--color-text-muted);">
                    <input type="checkbox" id="reg_terms" required style="margin-top: 3px;">
                    <label for="reg_terms">Ao criar a conta, concordo com os <a href="../terms.html"
                            style="color: var(--color-primary);">Termos de Uso</a> e <a href="../privacy.html"
                            style="color: var(--color-primary);">Política de Privacidade</a>.</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Finalizar Cadastro</button>

                <p style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--color-text-muted);">
                    Já tem uma conta? <a href="../login/" style="color: var(--color-primary); font-weight: 600;">Faça
                        Login</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        function handleRegister(e) {
            e.preventDefault();

            const nome = document.getElementById('reg_nome').value;
            const cpf = document.getElementById('reg_cpf').value;
            const email = document.getElementById('reg_email').value;
            const tel = document.getElementById('reg_tel').value;
            const pass = document.getElementById('reg_pass').value;
            const pass2 = document.getElementById('reg_pass2').value;

            if (pass !== pass2) {
                alert('As senhas não coincidem!');
                return false;
            }

            // Centralized Users Storage
            const users = JSON.parse(localStorage.getItem('cp_users') || '[]');

            if (users.some(u => u.cpf === cpf || u.email === email)) {
                alert('CPF ou E-mail já cadastrados!');
                return false;
            }

            const newUser = {
                id: Date.now(),
                nome: nome,
                cpf: cpf,
                email: email,
                telefone: tel,
                senha: pass, // In a real app, this would be hashed
                tutorial_completed: false, // Flag for onboarding
                createdAt: new Date().toISOString()
            };

            users.push(newUser);
            localStorage.setItem('cp_users', JSON.stringify(users));

            // Legacy sync (backward compatibility for existing blocks)
            const legacyClients = JSON.parse(localStorage.getItem('credpositivo_clientes') || '[]');
            legacyClients.push({
                nome: nome,
                cpf: cpf,
                email: email,
                senha: pass,
                telefone: tel,
                tipo: 'platform', // Indicates unified reg
                data: newUser.createdAt
            });
            localStorage.setItem('credpositivo_clientes', JSON.stringify(legacyClients));

            // Auto-login session
            localStorage.setItem('credpositivo_sessao', JSON.stringify(newUser));

            // Redirect to Login with success param (or directly to dashboard for onboarding)
            window.location.href = '../login/?cadastro=sucesso';
            return false;
        }
    </script>
</body>

</html>
