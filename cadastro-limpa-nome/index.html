<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CredPositivo | Cadastro Limpa Nome</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="../v2-assets/styles/layout.css">

    <style>
        body {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            overflow-y: auto;
            align-items: flex-start;
            height: auto;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--color-glass-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--color-border-glass);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            margin: auto;
            position: relative;
            overflow: hidden;
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
            padding: 0 20px;
        }

        .progress-container::after {
            content: '';
            position: absolute;
            top: 14px;
            left: 20px;
            right: 20px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 0;
        }

        .step {
            width: 30px;
            height: 30px;
            background: #222;
            border: 2px solid #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            font-size: 12px;
            font-weight: 700;
            transition: 0.3s;
            color: #fff;
        }

        .step.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #fff;
            box-shadow: 0 0 15px var(--color-primary-glow);
        }

        .step.done {
            background: var(--color-success);
            border-color: var(--color-success);
            color: #fff;
        }

        .form-step {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .form-step.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-center {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-center img {
            height: 50px;
            width: auto;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Logo -->
        <div class="logo-center">
            <a href=".."><img src="../v2-assets/assets/images/logo.webp" alt="CredPositivo"></a>
        </div>

        <h1 style="text-align: center; margin-bottom: 30px; font-size: 24px;">Limpa Nome Online</h1>

        <div class="progress-container">
            <div class="step active" id="step1-indicator">1</div>
            <div class="step" id="step2-indicator">2</div>
            <div class="step" id="step3-indicator">3</div>
        </div>

        <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 10px; text-align: center;">Cadastro Simplificado
        </h2>
        <p style="text-align: center; color: var(--color-text-muted); margin-bottom: 30px; font-size: 14px;">Preencha
            seus dados para iniciarmos a análise.</p>

        <form id="limpaNomeForm" onsubmit="return handleLimpaSubmit(event)">
            <!-- Step 1: Dados Pessoais -->
            <div class="form-step active" id="step1">
                <div class="form-group">
                    <label>Nome Completo *</label>
                    <input type="text" id="ln_nome" placeholder="Seu nome completo" required>
                </div>
                <div class="form-group">
                    <label>CPF *</label>
                    <input type="text" id="ln_cpf" placeholder="000.000.000-00" required>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Data de Nascimento</label>
                        <input type="date" id="ln_nasc">
                    </div>
                    <div class="form-group">
                        <label>Mãe</label>
                        <input type="text" id="ln_mae" placeholder="Primeiro nome da mãe">
                    </div>
                </div>

                <div style="margin-top: 30px;">
                    <button type="button" class="btn btn-primary btn-block" onclick="nextStep(2)">Próximo <i
                            class="ph ph-arrow-right"></i></button>
                </div>
            </div>

            <!-- Step 2: Contato e Endereço -->
            <div class="form-step" id="step2">
                <div class="grid-2">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="ln_email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Celular *</label>
                        <input type="tel" id="ln_celular" placeholder="(00) 90000-0000" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 16px; margin-bottom: 20px;">
                    <div>
                        <label>CEP</label>
                        <input type="text" id="ln_cep" placeholder="00000-000">
                    </div>
                    <div>
                        <label>Endereço Completo</label>
                        <input type="text" id="ln_endereco" placeholder="Rua, Número, Bairro">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group"><label>Cidade</label><input type="text" id="ln_cidade"></div>
                    <div class="form-group"><label>UF</label><input type="text" id="ln_uf"></div>
                </div>

                <div style="margin-top: 30px; display: flex; gap: 16px;">
                    <button type="button" class="btn"
                        style="background: transparent; border: 1px solid var(--color-border-glass); color: #fff; flex: 1;"
                        onclick="nextStep(1)">Voltar</button>
                    <button type="button" class="btn btn-primary" style="flex: 1;"
                        onclick="nextStep(3)">Próximo</button>
                </div>
            </div>

            <!-- Step 3: Revisão -->
            <div class="form-step" id="step3">
                <div
                    style="text-align: center; margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 16px;">
                    <i class="ph ph-shield-check"
                        style="font-size: 64px; color: var(--color-primary); margin-bottom: 20px;"></i>
                    <h3 style="font-size: 20px;">Quase lá!</h3>
                    <p style="color: var(--color-text-muted); margin-top: 10px;">
                        Ao clicar em finalizar, seus dados serão enviados para nossa equipe jurídica analisar seu caso.
                    </p>
                </div>

                <!-- Criar senha -->
                <div class="grid-2" style="margin-bottom: 20px;">
                    <div class="form-group"><label>Criar Senha *</label><input type="password" id="ln_senha"
                            placeholder="Mínimo 6 caracteres" required></div>
                    <div class="form-group"><label>Confirmar Senha *</label><input type="password" id="ln_senha2"
                            placeholder="Repita a senha" required></div>
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="ln_termos" style="width: 20px; height: 20px; margin-top: 2px;"
                            required>
                        <span style="font-size: 13px; line-height: 1.4; color: var(--color-text-muted);">
                            Declaro que li e concordo com os Termos de Uso e Política de Privacidade da CredPositivo.
                        </span>
                    </label>
                </div>

                <div style="margin-top: 30px; display: flex; gap: 16px;">
                    <button type="button" class="btn"
                        style="background: transparent; border: 1px solid var(--color-border-glass); color: #fff; flex: 1;"
                        onclick="nextStep(2)">Voltar</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Finalizar Cadastro</button>
                </div>
            </div>
        </form>

    </div>

    <script>
        function nextStep(step) {
            document.querySelectorAll('.form-step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');

            for (let i = 1; i <= 3; i++) {
                const indicator = document.getElementById('step' + i + '-indicator');
                if (i < step) {
                    indicator.classList.add('done');
                    indicator.classList.remove('active');
                    indicator.innerHTML = '<i class="ph ph-check"></i>';
                } else if (i === step) {
                    indicator.classList.add('active');
                    indicator.classList.remove('done');
                    indicator.innerText = i;
                } else {
                    indicator.classList.remove('active', 'done');
                    indicator.innerText = i;
                }
            }
        }

        async function handleLimpaSubmit(e) {
            e.preventDefault();

            const senha = document.getElementById('ln_senha').value;
            const senha2 = document.getElementById('ln_senha2').value;

            if (senha.length < 6) {
                alert('A senha deve ter pelo menos 6 caracteres.');
                return false;
            }

            if (senha !== senha2) {
                alert('As senhas não conferem.');
                return false;
            }

            if (!document.getElementById('ln_termos').checked) {
                alert('Aceite os termos para continuar.');
                return false;
            }

            const cliente = {
                id: Date.now(),
                nome: document.getElementById('ln_nome').value,
                cpf: document.getElementById('ln_cpf').value,
                email: document.getElementById('ln_email').value,
                telefone: document.getElementById('ln_celular').value,
                nascimento: document.getElementById('ln_nasc').value,
                mae: document.getElementById('ln_mae').value,
                cep: document.getElementById('ln_cep').value,
                endereco: document.getElementById('ln_endereco').value,
                cidade: document.getElementById('ln_cidade').value,
                uf: document.getElementById('ln_uf').value,
                senha: senha,
                tipo: 'limpa-nome',
                status: 'pendente',
                tutorial_completed: false,
                createdAt: new Date().toISOString()
            };

            // Register on backend API
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome: cliente.nome,
                        cpf: cliente.cpf.replace(/\D/g, ''),
                        email: cliente.email,
                        telefone: cliente.telefone.replace(/\D/g, ''),
                        senha: cliente.senha
                    })
                });
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('credpositivo_sessao', JSON.stringify(data.user || data));
                } else {
                    const data = await res.json();
                    alert(data.error || 'Erro ao cadastrar. Tente novamente.');
                    return false;
                }
            } catch (err) {
                alert('Erro de conexão. Tente novamente.');
                return false;
            }

            window.location.href = '../login/?cadastro=sucesso';
            return false;
        }
    </script>


</body>

</html>
