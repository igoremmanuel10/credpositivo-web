<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CredPositivo | Login Cliente</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Custom Layout -->
    <link rel="stylesheet" href="../v2-assets/styles/layout.css">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-muted);
            font-size: 18px;
        }

        .input-wrapper input {
            padding-left: 44px;
        }

        .links {
            margin-top: 24px;
            font-size: 13px;
            color: var(--color-text-muted);
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
        }

        .links a {
            color: var(--color-text-muted);
            text-decoration: none;
            transition: 0.2s;
        }

        .links a:hover {
            color: var(--color-primary);
        }

        .login-logo {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }

        .login-logo img {
            height: 50px;
            width: auto;
        }

        .alert-box {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--color-success);
            display: none;
        }

        .alert-box.show {
            display: block;
        }
    </style>
</head>

<body>
    <div class="glass-card" style="width: 100%; max-width: 400px; padding: 40px; text-align: center;">
        <div class="login-logo">
            <img src="../v2-assets/assets/images/logo.webp" alt="CredPositivo">
        </div>

        <p style="color: var(--color-text-muted); font-size: 14px; margin-bottom: 30px;">Acesse sua Área do Cliente</p>

        <div id="loginAlert" class="alert-box"></div>

        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="input-group">
                <label>Seu CPF ou E-mail</label>
                <div class="input-wrapper">
                    <i class="ph ph-user"></i>
                    <input type="text" id="loginUser" placeholder="Digite seu acesso..." required>
                </div>
            </div>

            <div class="input-group">
                <label>Sua Senha</label>
                <div class="input-wrapper">
                    <i class="ph ph-lock"></i>
                    <input type="password" id="loginPass" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Entrar</button>

            <div class="links">
                <a href="../cadastro/">Cadastrar-se</a>
                <a href="../recuperar-senha/">Esqueci minha senha</a>
            </div>
        </form>
    </div>

    <script>
        // Check if user just registered
        (function () {
            const params = new URLSearchParams(window.location.search);
            if (params.get('cadastro') === 'sucesso') {
                const alert = document.getElementById('loginAlert');
                alert.textContent = 'Cadastro realizado com sucesso! Faça login para acessar.';
                alert.classList.add('show');
            }
        })();

        async function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            const alertEl = document.getElementById('loginAlert');
            const btn = document.querySelector('button[type="submit"]');

            btn.disabled = true;
            btn.textContent = 'Entrando...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: user, senha: pass })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('credpositivo_sessao', JSON.stringify(data.user || data));
                    window.location.href = '../dash/';
                    return false;
                }

                alertEl.textContent = data.error || 'CPF/Email ou senha invalidos. Tente novamente.';
                alertEl.style.background = 'rgba(239, 68, 68, 0.1)';
                alertEl.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                alertEl.style.color = 'var(--color-danger)';
                alertEl.classList.add('show');
            } catch (err) {
                alertEl.textContent = 'Erro de conexao. Verifique sua internet e tente novamente.';
                alertEl.style.background = 'rgba(239, 68, 68, 0.1)';
                alertEl.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                alertEl.style.color = 'var(--color-danger)';
                alertEl.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }

            return false;
        }
    </script>

</body>

</html>
