<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Meus Serviços - CredPositivo Premium">
    <title>CredPositivo Premium | Meus Serviços</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../v2-assets/styles/layout.css">

    <style>
        .sidebar-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .sidebar-logo img {
            height: 36px;
            width: auto;
        }

        .coming-soon-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            text-align: center;
            gap: 16px;
        }

        .coming-soon-icon {
            font-size: 64px;
            color: var(--color-primary);
            opacity: 0.7;
        }

        .coming-soon-title {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        .coming-soon-text {
            font-size: 16px;
            color: var(--color-text-muted);
            max-width: 400px;
        }

        .mobile-nav { display: none; }

        @media (max-width: 768px) {
            .mobile-nav {
                display: flex;
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                width: 92%;
                max-width: 420px;
                background: rgba(20, 20, 20, 0.85);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 50px;
                padding: 10px 20px;
                justify-content: space-between;
                align-items: center;
                z-index: 1000;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            }

            .mobile-nav-item {
                color: rgba(255, 255, 255, 0.5);
                font-size: 24px;
                padding: 10px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                text-decoration: none;
            }

            .mobile-nav-item span {
                font-size: 10px;
                font-weight: 500;
            }

            .mobile-nav-item.active {
                color: var(--color-primary);
            }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <a href=".." class="sidebar-logo">
            <img src="../v2-assets/assets/images/logo.webp" alt="CredPositivo">
        </a>

        <nav class="main-nav">
            <ul>
                <li><a href="/dash/" class="nav-link"><i class="ph ph-squares-four"></i> Visão Geral</a></li>
                <li><a href="/dash/servicos" class="nav-link active"><i class="ph ph-file-text"></i> Meus Serviços</a>
                </li>
                <li><a href="/dash/financeiro" class="nav-link"><i class="ph ph-wallet"></i> Financeiro</a></li>
                <li><a href="/dash/loja" class="nav-link"><i class="ph ph-storefront"></i> Loja</a></li>
            </ul>

            <div class="nav-title"
                style="margin-top: 30px; font-size: 11px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 1px; padding: 0 20px;">
                EVOLUÇÃO</div>
            <ul>
                <li><a href="/dash/jornada/" class="nav-link"><i class="ph ph-rocket-launch"></i> Jornada Premium</a></li>
                <li><a href="/dash/afiliado" class="nav-link"><i class="ph ph-users-three"></i> Programa Afiliados</a></li>
            </ul>

            <div class="nav-title"
                style="margin-top: 30px; font-size: 11px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 1px; padding: 0 20px;">
                SISTEMA</div>
            <ul>
                <li><a href="/dash/suporte" class="nav-link"><i class="ph ph-headset"></i> Suporte</a></li>
                <li><a href="/dash/configuracoes" class="nav-link"><i class="ph ph-gear"></i> Configurações</a></li>
                <li><a href="#" class="nav-link" onclick="logout()"><i class="ph ph-sign-out"></i> Sair</a></li>
            </ul>
        </nav>

        <footer class="sidebar-footer">
            <div class="credit-label" style="font-size: 12px; color: var(--color-text-muted);">Saldo Disponível</div>
            <div class="credit-amount" style="font-size: 24px; font-weight: 700; margin: 4px 0;">R$ 0,00</div>
            <button class="btn-link-action"
                style="font-size: 13px; color: var(--color-primary); background: none; border: none; cursor: pointer;"><i
                    class="ph ph-plus-circle"></i> Adicionar Saldo</button>
        </footer>
    </aside>

    <main class="dashboard-container">

        <header class="top-bar"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <button class="mobile-menu-toggle">
                <i class="ph ph-list"></i>
            </button>
            <div class="greeting">
                <h1>Meus <span style="color: var(--color-primary);">Serviços</span></h1>
                <p style="color: var(--color-text-muted); font-size: 14px;">Acompanhe o andamento dos seus processos em
                    tempo real.</p>
            </div>

            <div class="user-actions" style="display: flex; align-items: center; gap: 16px;">
                <button class="btn-icon" aria-label="Notificações"
                    style="width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid var(--color-border-glass); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                    <i class="ph ph-bell"></i>
                </button>
                <div
                    style="width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 2px solid var(--color-primary);">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=C&background=181B21&color=fff"
                        alt="Perfil" style="width: 100%; height: 100%;">
                </div>
            </div>
        </header>

        <!-- Lista de Serviços -->
        <section id="servicesContainer"
            style="display: flex; flex-direction: column; gap: 20px; max-width: 900px; margin: 0 auto;">
            <!-- Orders will be rendered here -->
        </section>

    </main>

    <!-- Mobile Nav -->
    <nav class="mobile-nav">
        <a href="/dash/" class="mobile-nav-item"><i class="ph ph-house"></i><span>Home</span></a>
        <a href="/dash/jornada/" class="mobile-nav-item"><i class="ph ph-rocket-launch"></i><span>Jornada</span></a>
        <a href="/dash/loja" class="mobile-nav-item"><i class="ph ph-storefront"></i><span>Loja</span></a>
        <a href="/dash/servicos" class="mobile-nav-item active"><i class="ph ph-file-text"></i><span>Servi&#231;os</span></a>
        <a href="/dash/configuracoes" class="mobile-nav-item"><i class="ph ph-user-circle"></i><span>Perfil</span></a>
    </nav>

    <script src="../v2-assets/scripts/app.js"></script>
    <script>
        // Load user data from session and fetch orders
        (async function () {
            const sessao = JSON.parse(localStorage.getItem('credpositivo_sessao') || 'null');
            if (sessao && sessao.nome) {
                const userAvatar = document.getElementById('userAvatar');
                if (userAvatar) userAvatar.src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(sessao.nome) + '&background=181B21&color=fff';
            }

            // Check for payment return parameters
            const params = new URLSearchParams(window.location.search);
            if (params.get('payment') === 'success') {
                showToast('Pagamento confirmado! Seu pedido está sendo processado.');
                window.history.replaceState({}, '', window.location.pathname);
            } else if (params.get('payment') === 'failure') {
                showToast('Pagamento não aprovado. Tente novamente.', 'error');
                window.history.replaceState({}, '', window.location.pathname);
            }

            const container = document.getElementById('servicesContainer');

            // Status mapping (English + Portuguese fallback)
            const statusMap = {
                'pending': { label: 'Aguardando Pagamento' },
                'paid': { label: 'Pagamento Confirmado' },
                'completed': { label: 'Concluído' },
                'error': { label: 'Erro no Processamento' },
                'rejected': { label: 'Pagamento Rejeitado' },
                'Concluído': { label: 'Concluído' },
                'Concluido': { label: 'Concluído' },
                'Pendente': { label: 'Aguardando Pagamento' },
                'Pago': { label: 'Pagamento Confirmado' },
            };

            const statusColors = {
                'pending': { bg: 'rgba(255,165,0,0.1)', color: '#ffa500' },
                'paid': { bg: 'rgba(59,130,246,0.1)', color: '#3b82f6' },
                'completed': { bg: 'rgba(34,197,94,0.1)', color: '#22c55e' },
                'error': { bg: 'rgba(239,68,68,0.1)', color: '#ef4444' },
                'rejected': { bg: 'rgba(239,68,68,0.1)', color: '#ef4444' },
                'Concluído': { bg: 'rgba(34,197,94,0.1)', color: '#22c55e' },
                'Concluido': { bg: 'rgba(34,197,94,0.1)', color: '#22c55e' },
                'Pendente': { bg: 'rgba(255,165,0,0.1)', color: '#ffa500' },
                'Pago': { bg: 'rgba(59,130,246,0.1)', color: '#3b82f6' },
            };

            // Try API first, fallback to localStorage
            let orders = [];
            const cpf = sessao?.cpf;

            if (cpf) {
                try {
                    const res = await fetch('/api/orders/' + cpf.replace(/[^0-9]/g, ''));
                    if (res.ok) {
                        const data = await res.json();
                        orders = data.orders || [];
                    }
                } catch (e) {
                    console.log('API unavailable, using localStorage');
                }
            }

            // Fallback: merge with localStorage orders
            const localOrders = JSON.parse(localStorage.getItem('cp_orders') || '[]')
                .filter(o => o.user_id === (sessao?.id || ''));

            if (orders.length === 0 && localOrders.length > 0) {
                orders = localOrders.map(o => ({
                    id: o.id,
                    service: o.service,
                    price: o.price,
                    status: o.status === 'Aguardando Pagamento' ? 'pending' :
                            o.status === 'Concluído' ? 'completed' : 'pending',
                    created_at: o.date,
                    diagnostico_id: null,
                    diagnostico_status: null,
                }));
            }

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="glass-card" style="padding: 40px; text-align: center;">
                        <i class="ph ph-file-search" style="font-size: 48px; color: var(--color-text-muted); opacity: 0.5; display: block; margin-bottom: 16px;"></i>
                        <h3 style="color: #fff; margin-bottom: 8px;">Nenhum serviço contratado</h3>
                        <p style="color: var(--color-text-muted); margin-bottom: 24px;">Você ainda não possui processos ativos em nossa plataforma.</p>
                        <a href="/dash/loja" class="btn btn-primary" style="display: inline-flex;">Explorar Loja</a>
                    </div>
                `;
                return;
            }

            orders.forEach(order => {
                const info = statusMap[order.status] || { label: order.status, progress: 0 };
                const sColor = statusColors[order.status] || { bg: 'rgba(255,165,0,0.1)', color: '#ffa500' };
                const date = new Date(order.created_at).toLocaleDateString('pt-BR');

                // Download button for completed diagnosticos
                let downloadBtn = '';
                if (order.diagnostico_id && order.diagnostico_status === 'completed') {
                    downloadBtn = `
                        <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--color-border-glass);">
                            <a href="/api/diagnostico/${order.diagnostico_id}"
                               class="btn btn-primary"
                               style="display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; font-size: 13px; text-decoration: none;">
                                <i class="ph ph-file-pdf"></i> Baixar Diagnóstico (PDF)
                            </a>
                        </div>`;
                } else if (order.diagnostico_id && order.diagnostico_status === 'processing') {
                    downloadBtn = `
                        <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--color-border-glass); font-size: 12px; color: var(--color-primary);">
                            <i class="ph ph-spinner"></i> Diagnóstico sendo processado...
                        </div>`;
                }

                const card = document.createElement('article');
                card.className = 'glass-card';
                card.style.padding = '24px';
                // Format CPF for display
                const cpfDisplay = order.cpf ? order.cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4') : '';
                const personInfo = (order.customer_name || order.cpf || order.customer_phone) ? `
                    <div style="margin-top: 14px; padding: 12px 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--color-border-glass); border-radius: 10px; display: flex; gap: 20px; flex-wrap: wrap; font-size: 13px;">
                        ${order.customer_name ? '<div><span style="color: var(--color-text-muted);">Nome:</span> <span style="color: #fff; font-weight: 500;">' + order.customer_name + '</span></div>' : ''}
                        ${cpfDisplay ? '<div><span style="color: var(--color-text-muted);">CPF:</span> <span style="color: #fff; font-weight: 500;">' + cpfDisplay + '</span></div>' : ''}
                        ${order.customer_phone ? '<div><span style="color: var(--color-text-muted);">Telefone:</span> <span style="color: #fff; font-weight: 500;">' + order.customer_phone + '</span></div>' : ''}
                    </div>` : '';

                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div style="display: flex; gap: 16px; align-items: center;">
                            <div style="width: 48px; height: 48px; background: rgba(59,130,246,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--color-primary); font-size: 24px;">
                                <i class="ph ph-rocket-launch"></i>
                            </div>
                            <div>
                                <h3 style="font-size: 18px; color: #fff;">${order.service}</h3>
                                <p style="font-size: 13px; color: var(--color-text-muted);">Pedido #${order.id} | ${date} | R$ ${parseFloat(order.price).toFixed(2)}</p>
                            </div>
                        </div>
                        <span style="background: ${sColor.bg}; color: ${sColor.color}; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap;">${info.label.toUpperCase()}</span>
                    </div>
                    ${personInfo}

                    <div style="margin-top: 16px; font-size: 13px; color: var(--color-text-muted); display: flex; align-items: center; gap: 6px;">
                        <i class="ph ph-info" style="color: var(--color-primary);"></i>
                        ${(order.status === 'pending' || order.status === 'Pendente') ? 'Aguardando confirmação do pagamento.' :
                          (order.status === 'paid' || order.status === 'Pago') ? 'Pagamento confirmado! Processando seu pedido.' :
                          (order.status === 'completed' || order.status === 'Concluído' || order.status === 'Concluido') ? 'Processo concluído com sucesso!' :
                          order.status === 'error' ? 'Houve um erro. Entre em contato com o suporte.' :
                          order.status === 'rejected' ? 'Pagamento não aprovado.' :
                          'Processando...'}
                    </div>
                    ${downloadBtn}
                `;
                container.appendChild(card);
            });
        })();

        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;top:20px;right:20px;z-index:9999;padding:16px 24px;border-radius:12px;font-size:14px;color:#fff;backdrop-filter:blur(10px);' +
                (type === 'error' ? 'background:rgba(239,68,68,0.9);' : 'background:rgba(34,197,94,0.9);');
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function logout() {
            localStorage.removeItem('credpositivo_sessao');
            window.location.href = '../login';
        }
    </script>
</body>

</html>
